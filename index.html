<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIDS CORNER GAME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="phone">

    <!-- Screen 1 -->
    <div id="screen1" class="screen active">
        <h2>Imbas Kod QR</h2>

        <div class="qr-box">
            QR CODE
        </div>

        <button onclick="nextScreen(2)">
            Imbas QR
        </button>
    </div>

    <!-- Screen 2 -->
    <div id="screen2" class="screen">

        <h2>Semak Maklumat</h2>

        <p><b>Nama Kafe:</b> Kafe SG</p>
        <p><b>Jumlah SGD:</b> SGD 10</p>
        <p><b>Jumlah MYR:</b> RM 31.74</p>

        <button onclick="nextScreen(3)">
            Teruskan
        </button>

    </div>

    <!-- Screen 3 -->
    <div id="screen3" class="screen">

        <h2>Sahkan Pembayaran</h2>

        <input
            type="password"
            maxlength="6"
            id="pin"
            placeholder="Masukkan PIN"
        >

        <button onclick="verifyPin()">
            Sahkan
        </button>

    </div>

    <!-- Screen 4 -->
    <div id="screen4" class="screen success">

        <div class="checkmark">
            ✓
        </div>

        <h2>Pembayaran Berjaya</h2>

        <p>RM 31.74 telah dibayar</p>

        <div class="confetti">
            🎉 🎊 🎉
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
